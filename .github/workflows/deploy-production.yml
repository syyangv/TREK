name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Pinned stable image tag to deploy or roll back to (for example 3.5.0)"
        required: true
        type: string
      action:
        description: "Deployment operation"
        required: true
        type: choice
        options: [deploy, rollback]
        default: deploy

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: ${{ inputs.action }} pinned stable release
    if: github.repository == 'syyangv/TREK'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      APP_URL: ${{ vars.APP_URL }}
      DEPLOY_AGENT_URL: ${{ vars.DEPLOY_AGENT_URL }}
    steps:
      - name: Validate stable version
        id: version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a stable semantic version, got: $VERSION" >&2
            exit 1
          fi
          {
            echo "version=$VERSION"
            echo "source_ref=v$VERSION"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}

      - name: Validate production configuration
        env:
          TREK_DEPLOY_TOKEN: ${{ secrets.TREK_DEPLOY_TOKEN }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
          TS_TARGETS: ${{ vars.TS_TARGETS }}
        run: |
          test -n "$TREK_DEPLOY_TOKEN"
          test -n "$TS_OAUTH_CLIENT_ID"
          test -n "$TS_OAUTH_SECRET"
          test -n "$TS_TARGETS"
          test -n "$APP_URL"
          test -n "$DEPLOY_AGENT_URL"
          test -f scripts/trek_deploy_client.py

      - name: Connect runner to production tailnet
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade # v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ vars.TS_TAGS || 'tag:trek-staging-ci' }}
          targets: ${{ vars.TS_TARGETS }}
          use-cache: 'true'

      - name: Verify tailnet deployment agent
        run: |
          tailscale status --json | jq -e '.BackendState == "Running"'
          curl --fail --silent --show-error -- "$DEPLOY_AGENT_URL/healthz"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve immutable image digest
        id: image
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DIGEST="$(docker buildx imagetools inspect "thvysy44/trek-fork:$VERSION" --format '{{.Manifest.Digest}}')"
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid image digest: $DIGEST" >&2
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image=thvysy44/trek-fork@$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Deploy exact image through restricted agent
        env:
          TREK_DEPLOY_TOKEN: ${{ secrets.TREK_DEPLOY_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SOURCE_REF: ${{ steps.version.outputs.source_ref }}
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          python3 scripts/trek_deploy_client.py \
            --url "$DEPLOY_AGENT_URL" \
            --environment production \
            --action "${{ inputs.action }}" \
            --version "$VERSION" \
            --source-ref "$SOURCE_REF" \
            --image "$IMAGE" \
            --request-id "run-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"

      - name: Verify production health
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 \
            --retry-connrefused -- "$APP_URL/api/health"

      - name: Record deployment identity
        if: ${{ success() }}
        run: |
          {
            echo "### Production ${{ inputs.action }}"
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Digest: \`${{ steps.image.outputs.digest }}\`"
            echo "- Source: \`${{ steps.version.outputs.source_ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
