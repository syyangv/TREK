name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'wiki/**'
      - '.github/workflows/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'plugin-sdk/**'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Force bump line (auto = patch/finalize as today)'
        type: choice
        options: [auto, patch, minor, major]
        default: auto
      confirm_major:
        description: "Type MAJOR (all caps) to confirm a major release"
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: stable-build
  cancel-in-progress: false

jobs:
  verify-ci:
    name: Verify Unified CI
    if: github.repository == 'syyangv/TREK' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      release_ref: ${{ steps.resolve.outputs.release_ref }}
    steps:
      - name: Resolve release ref
        id: resolve
        run: echo "release_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Verify CI and security succeeded for release commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetSha = context.sha;

            const required = ["CI", "Security Scan"];
            const deadline = Date.now() + 15 * 60 * 1000;

            while (Date.now() < deadline) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                event: "push",
                head_sha: targetSha,
                per_page: 100,
              });
              const successfulRuns = new Map();
              for (const name of required) {
                const success = data.workflow_runs.find(
                  (run) => run.name === name && run.status === "completed" && run.conclusion === "success",
                );
                if (success) successfulRuns.set(name, success);
              }

              // A workflow can be re-run for the same SHA. A later successful re-run
              // satisfies this release gate even if an earlier attempt failed.
              if (required.every((name) => successfulRuns.has(name))) {
                for (const name of required) {
                  core.info(`Verified ${name} via run ${successfulRuns.get(name).id}.`);
                }
                return;
              }

              core.info(`Waiting for required workflows on ${targetSha}...`);
              await new Promise((resolve) => setTimeout(resolve, 15000));
            }

            core.setFailed(`Timed out waiting for CI and Security Scan on ${targetSha}.`);

  version-bump:
    if: github.repository == 'syyangv/TREK'
    runs-on: ubuntu-latest
    needs: verify-ci
    outputs:
      version: ${{ steps.bump.outputs.VERSION }}
      source_sha: ${{ steps.bump.outputs.SOURCE_SHA }}
      release_branch: ${{ steps.bump.outputs.RELEASE_BRANCH }}
      already_released: ${{ steps.bump.outputs.ALREADY_RELEASED }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-ci.outputs.release_ref }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type and update version
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags

          # Derive version from git tags — no package.json dependency
          STABLE_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v '\-pre\.' | sort -V | tail -1)
          STABLE="${STABLE_TAG#v}"
          STABLE="${STABLE:-0.0.0}"
          BASE_SHA="$(git rev-parse HEAD)"

          # Recover an ambiguously completed prior run. A published tag plus the
          # matching temporary branch proves the release transaction completed,
          # even if its runner failed before cleanup/status reporting.
          if [ -n "$STABLE_TAG" ]; then
            RECOVERY_BRANCH="release-build/$STABLE_TAG"
            if git ls-remote --exit-code --heads origin "refs/heads/$RECOVERY_BRANCH" >/dev/null 2>&1 \
              && gh release view "$STABLE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              git fetch origin \
                "refs/heads/$RECOVERY_BRANCH:refs/remotes/origin/$RECOVERY_BRANCH" \
                "refs/tags/$STABLE_TAG:refs/tags/$STABLE_TAG"
              RECOVERY_SHA="$(git rev-parse "refs/remotes/origin/$RECOVERY_BRANCH")"
              RECOVERY_PARENT="$(git rev-parse "$RECOVERY_SHA^")"
              TAG_SHA="$(git rev-list -n 1 "$STABLE_TAG")"
              IS_DRAFT="$(gh release view "$STABLE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)"

              if [ "$IS_DRAFT" = "false" ] && [ "$RECOVERY_SHA" = "$TAG_SHA" ]; then
                if [ "$RECOVERY_PARENT" = "$BASE_SHA" ]; then
                  echo "Recovered completed release $STABLE_TAG at $TAG_SHA for current base $BASE_SHA."
                  echo "VERSION=$STABLE" >> "$GITHUB_OUTPUT"
                  echo "SOURCE_SHA=$TAG_SHA" >> "$GITHUB_OUTPUT"
                  echo "RELEASE_BRANCH=$RECOVERY_BRANCH" >> "$GITHUB_OUTPUT"
                  echo "ALREADY_RELEASED=true" >> "$GITHUB_OUTPUT"
                  gh api --method DELETE \
                    "repos/${GITHUB_REPOSITORY}/git/refs/heads/${RECOVERY_BRANCH}" \
                    || echo "::warning::Could not remove recovered branch ${RECOVERY_BRANCH}."
                  exit 0
                fi

                # This is a completed older release, not the current main SHA.
                # Its tag preserves the commit, so stale branch cleanup is safe.
                gh api --method DELETE \
                  "repos/${GITHUB_REPOSITORY}/git/refs/heads/${RECOVERY_BRANCH}" \
                  || echo "::warning::Could not remove stale branch ${RECOVERY_BRANCH}; continuing with the new release."
              fi
            fi
          fi

          echo "ALREADY_RELEASED=false" >> "$GITHUB_OUTPUT"

          PRE_TAG=$(git tag -l 'v*-pre.*' | sort -V | tail -1)

          BUMP_INPUT="${{ github.event.inputs.bump || 'auto' }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$STABLE"

          if [ "$BUMP_INPUT" = "major" ]; then
            if [ "${{ github.event.inputs.confirm_major }}" != "MAJOR" ]; then
              echo "::error::confirm_major must equal 'MAJOR' to cut a major release"
              exit 1
            fi
            NEW_VERSION="$((MAJOR + 1)).0.0"
            BUMP="major"
          elif [ "$BUMP_INPUT" = "minor" ]; then
            NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
            BUMP="minor"
          elif [ "$BUMP_INPUT" = "patch" ]; then
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            BUMP="patch"
          else
            # auto: finalize in-flight prerelease if one exists, else patch
            if [ -n "$PRE_TAG" ]; then
              PRE_BASE="${PRE_TAG#v}"
              PRE_BASE="${PRE_BASE%-pre.*}"
              PRE_MAJOR="$(echo "$PRE_BASE" | cut -d. -f1)"
              # Refuse to auto-finalize a major bump — it bypasses confirm_major
              if [ "$PRE_MAJOR" -gt "$MAJOR" ]; then
                echo "::error::In-flight prerelease $PRE_TAG is a major bump ($STABLE → $PRE_BASE). Use bump=major with confirm_major=MAJOR to finalize."
                exit 1
              fi
              # If prerelease base is strictly greater than stable, finalize it
              HIGHEST=$(printf '%s\n' "$PRE_BASE" "$STABLE" | sort -V | tail -1)
              if [ "$HIGHEST" = "$PRE_BASE" ] && [ "$PRE_BASE" != "$STABLE" ]; then
                NEW_VERSION="$PRE_BASE"
                BUMP="finalize"
              else
                PATCH=$((PATCH + 1))
                NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
                BUMP="patch"
              fi
            else
              PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
              BUMP="patch"
            fi
          fi

          echo "Bump type: $BUMP"
          RELEASE_BRANCH="release-build/v$NEW_VERSION"
          echo "VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "RELEASE_BRANCH=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "$STABLE → $NEW_VERSION ($BUMP)"

          # Update all workspace + root package.json files and the root lockfile in one shot
          npm version "$NEW_VERSION" --workspaces --include-workspace-root --no-git-tag-version
          sed -i "s/^version: .*/version: $NEW_VERSION/" charts/trek/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"$NEW_VERSION\"/" charts/trek/Chart.yaml

          # Commit generated release metadata without mutating protected main.
          # A temporary branch makes the commit reachable by downstream jobs;
          # the immutable release tag is created only after all artifacts pass.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json server/package.json client/package.json shared/package.json charts/trek/Chart.yaml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          GENERATED_SHA="$(git rev-parse HEAD)"
          GENERATED_TREE="$(git rev-parse 'HEAD^{tree}')"

          # Resume only when the complete generated tree and validated parent
          # match. This rejects injected source changes on a stale branch.
          if git ls-remote --exit-code --heads origin "refs/heads/$RELEASE_BRANCH" >/dev/null 2>&1; then
            git fetch origin "refs/heads/$RELEASE_BRANCH"
            EXISTING_SHA="$(git rev-parse FETCH_HEAD)"
            EXISTING_PARENT="$(git rev-parse "$EXISTING_SHA^")"
            EXISTING_TREE="$(git rev-parse "$EXISTING_SHA^{tree}")"

            if [ "$EXISTING_PARENT" != "$BASE_SHA" ] || [ "$EXISTING_TREE" != "$GENERATED_TREE" ]; then
              echo "::error::$RELEASE_BRANCH does not match the deterministic release tree from base $BASE_SHA. Resolve the stale branch before retrying."
              exit 1
            fi

            echo "Resuming verified release commit $EXISTING_SHA from $RELEASE_BRANCH."
            echo "SOURCE_SHA=$EXISTING_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "SOURCE_SHA=$GENERATED_SHA" >> "$GITHUB_OUTPUT"
            git push origin "HEAD:refs/heads/$RELEASE_BRANCH"
          fi

  build:
    runs-on: ${{ matrix.runner }}
    needs: [verify-ci, version-bump]
    if: needs.version-bump.outputs.already_released != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform tag-safe name
        run: echo "PLATFORM_PAIR=$(echo ${{ matrix.platform }} | sed 's|/|-|g')" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.source_sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=thvysy44/trek-fork,push-by-digest=true,name-canonical=true,push=true
          no-cache: true
          sbom: true
          provenance: mode=max
          build-args: |
            APP_VERSION=${{ needs.version-bump.outputs.version }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [verify-ci, version-bump, build]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.source_sha }}

      - name: Download build digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          mapfile -t digests < <(printf 'thvysy44/trek-fork@sha256:%s\n' *)
          MAJOR_TAG="$(echo "$VERSION" | cut -d. -f1)"
          docker buildx imagetools create \
            -t "thvysy44/trek-fork:latest" \
            -t "thvysy44/trek-fork:$MAJOR_TAG" \
            -t "thvysy44/trek-fork:$VERSION" \
            "${digests[@]}"

      - name: Inspect manifest
        run: docker buildx imagetools inspect thvysy44/trek-fork:latest

      - name: Export release manifest metadata
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          docker buildx imagetools inspect --raw "thvysy44/trek-fork:${VERSION}" \
            > "trek-${VERSION}-manifest.json"

      - name: Upload release manifest metadata
        uses: actions/upload-artifact@v4
        with:
          name: trek-${{ needs.version-bump.outputs.version }}-manifest
          path: trek-${{ needs.version-bump.outputs.version }}-manifest.json
          retention-days: 90

  release-helm:
    runs-on: ubuntu-latest
    needs: [verify-ci, version-bump, merge]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.source_sha }}

      - name: Publish Helm chart
        uses: stefanprodan/helm-gh-pages@v1.7.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          charts_dir: charts

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [verify-ci, version-bump, merge, release-helm]
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.source_sha }}
          fetch-depth: 0

      - name: Generate SBOM for released image
        uses: anchore/sbom-action@v0
        with:
          image: thvysy44/trek-fork:${{ needs.version-bump.outputs.version }}
          format: cyclonedx-json
          output-file: trek-${{ needs.version-bump.outputs.version }}-sbom.cdx.json
          upload-artifact: false

      - name: Download release manifest metadata
        uses: actions/download-artifact@v4
        with:
          name: trek-${{ needs.version-bump.outputs.version }}-manifest

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: trek-${{ needs.version-bump.outputs.version }}-sbom
          path: trek-${{ needs.version-bump.outputs.version }}-sbom.cdx.json
          retention-days: 90

      - name: Publish verified release transaction
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version-bump.outputs.version }}
          SOURCE_SHA: ${{ needs.version-bump.outputs.source_sha }}
        run: |
          TAG="v${VERSION}"

          if gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber \
              "trek-${VERSION}-sbom.cdx.json#SBOM (CycloneDX)" \
              "trek-${VERSION}-manifest.json#Multi-arch image manifest"
          else
            gh release create "v${VERSION}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "$SOURCE_SHA" \
              --title "TREK v${VERSION}" \
              --draft \
              --generate-notes \
              "trek-${VERSION}-sbom.cdx.json#SBOM (CycloneDX)" \
              "trek-${VERSION}-manifest.json#Multi-arch image manifest"
          fi

          TARGET="$(gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" --json targetCommitish --jq .targetCommitish)"
          if [ "$TARGET" != "$SOURCE_SHA" ]; then
            echo "::error::Release $TAG targets $TARGET, expected $SOURCE_SHA."
            exit 1
          fi

          IS_DRAFT="$(gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq .isDraft)"
          if [ "$IS_DRAFT" = "false" ]; then
            git fetch origin "refs/tags/$TAG:refs/tags/$TAG" --force
            TAG_SHA="$(git rev-list -n 1 "$TAG")"
            if [ "$TAG_SHA" != "$SOURCE_SHA" ]; then
              echo "::error::Published tag $TAG points to $TAG_SHA, expected $SOURCE_SHA."
              exit 1
            fi
            exit 0
          fi

          # Final irreversible operation: no fallible verification follows.
          gh release edit "$TAG" --repo "${GITHUB_REPOSITORY}" --draft=false

  cleanup-release-branch:
    name: Cleanup release-build branch
    runs-on: ubuntu-latest
    needs: [version-bump, release]
    if: ${{ always() && needs.release.result == 'success' && needs.version-bump.outputs.already_released != 'true' }}
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - name: Remove temporary release-build branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BRANCH: ${{ needs.version-bump.outputs.release_branch }}
        run: |
          gh api --method DELETE \
            "repos/${GITHUB_REPOSITORY}/git/refs/heads/${RELEASE_BRANCH}" \
            || echo "::warning::Could not remove temporary branch ${RELEASE_BRANCH}; release remains valid."
