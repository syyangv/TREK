name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'wiki/**'
      - '.github/workflows/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'plugin-sdk/**'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Force bump line (auto = patch/finalize as today)'
        type: choice
        options: [auto, patch, minor, major]
        default: auto
      confirm_major:
        description: "Type MAJOR (all caps) to confirm a major release"
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: stable-build
  cancel-in-progress: false

jobs:
  verify-ci:
    name: Verify Unified CI
    if: github.repository == 'syyangv/TREK'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      release_ref: ${{ steps.resolve.outputs.release_ref }}
    steps:
      - name: Resolve release ref
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_ref=main" >> "$GITHUB_OUTPUT"
          else
            echo "release_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify CI succeeded for release commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetSha = context.eventName === "workflow_dispatch"
              ? (await github.rest.repos.getBranch({ owner, repo, branch: "main" })).data.commit.sha
              : context.sha;

            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              event: "push",
              head_sha: targetSha,
              per_page: 100,
            });

            const matchingRun = data.workflow_runs.find((run) => run.name === "CI");

            if (!matchingRun) {
              core.setFailed(`No successful 'CI' workflow run found for ${targetSha}.`);
              return;
            }

            if (matchingRun.status !== "completed" || matchingRun.conclusion !== "success") {
              core.setFailed(`'CI' for ${targetSha} is ${matchingRun.status}/${matchingRun.conclusion}.`);
              return;
            }

            core.info(`Verified CI success for ${targetSha} via run ${matchingRun.id}.`);

  version-bump:
    if: github.repository == 'syyangv/TREK'
    runs-on: ubuntu-latest
    needs: verify-ci
    outputs:
      version: ${{ steps.bump.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-ci.outputs.release_ref }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type and update version
        id: bump
        run: |
          git fetch --tags

          # Derive version from git tags — no package.json dependency
          STABLE_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v '\-pre\.' | sort -V | tail -1)
          STABLE="${STABLE_TAG#v}"
          STABLE="${STABLE:-0.0.0}"

          PRE_TAG=$(git tag -l 'v*-pre.*' | sort -V | tail -1)

          BUMP_INPUT="${{ github.event.inputs.bump || 'auto' }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$STABLE"

          if [ "$BUMP_INPUT" = "major" ]; then
            if [ "${{ github.event.inputs.confirm_major }}" != "MAJOR" ]; then
              echo "::error::confirm_major must equal 'MAJOR' to cut a major release"
              exit 1
            fi
            NEW_VERSION="$((MAJOR + 1)).0.0"
            BUMP="major"
          elif [ "$BUMP_INPUT" = "minor" ]; then
            NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
            BUMP="minor"
          elif [ "$BUMP_INPUT" = "patch" ]; then
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            BUMP="patch"
          else
            # auto: finalize in-flight prerelease if one exists, else patch
            if [ -n "$PRE_TAG" ]; then
              PRE_BASE="${PRE_TAG#v}"
              PRE_BASE="${PRE_BASE%-pre.*}"
              PRE_MAJOR="$(echo "$PRE_BASE" | cut -d. -f1)"
              # Refuse to auto-finalize a major bump — it bypasses confirm_major
              if [ "$PRE_MAJOR" -gt "$MAJOR" ]; then
                echo "::error::In-flight prerelease $PRE_TAG is a major bump ($STABLE → $PRE_BASE). Use bump=major with confirm_major=MAJOR to finalize."
                exit 1
              fi
              # If prerelease base is strictly greater than stable, finalize it
              HIGHEST=$(printf '%s\n' "$PRE_BASE" "$STABLE" | sort -V | tail -1)
              if [ "$HIGHEST" = "$PRE_BASE" ] && [ "$PRE_BASE" != "$STABLE" ]; then
                NEW_VERSION="$PRE_BASE"
                BUMP="finalize"
              else
                PATCH=$((PATCH + 1))
                NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
                BUMP="patch"
              fi
            else
              PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
              BUMP="patch"
            fi
          fi

          echo "Bump type: $BUMP"
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "$STABLE → $NEW_VERSION ($BUMP)"

          # Update all workspace + root package.json files and the root lockfile in one shot
          npm version "$NEW_VERSION" --workspaces --include-workspace-root --no-git-tag-version
          sed -i "s/^version: .*/version: $NEW_VERSION/" charts/trek/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"$NEW_VERSION\"/" charts/trek/Chart.yaml

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json server/package.json client/package.json shared/package.json charts/trek/Chart.yaml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin main --follow-tags

  build:
    runs-on: ${{ matrix.runner }}
    needs: [verify-ci, version-bump]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform tag-safe name
        run: echo "PLATFORM_PAIR=$(echo ${{ matrix.platform }} | sed 's|/|-|g')" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=syyangv/trek,push-by-digest=true,name-canonical=true,push=true
          no-cache: true
          sbom: true
          provenance: mode=max
          build-args: |
            APP_VERSION=${{ needs.version-bump.outputs.version }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [verify-ci, version-bump, build]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download build digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          mapfile -t digests < <(printf 'syyangv/trek@sha256:%s\n' *)
          MAJOR_TAG="$(echo "$VERSION" | cut -d. -f1)"
          docker buildx imagetools create \
            -t "syyangv/trek:latest" \
            -t "syyangv/trek:$MAJOR_TAG" \
            -t "syyangv/trek:$VERSION" \
            "${digests[@]}"

      - name: Inspect manifest
        run: docker buildx imagetools inspect syyangv/trek:latest

      - name: Export release manifest metadata
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          docker buildx imagetools inspect --raw "syyangv/trek:${VERSION}" \
            > "trek-${VERSION}-manifest.json"

      - name: Upload release manifest metadata
        uses: actions/upload-artifact@v4
        with:
          name: trek-${{ needs.version-bump.outputs.version }}-manifest
          path: trek-${{ needs.version-bump.outputs.version }}-manifest.json
          retention-days: 90

  release-helm:
    runs-on: ubuntu-latest
    needs: [verify-ci, version-bump]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Publish Helm chart
        uses: stefanprodan/helm-gh-pages@v1.7.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          charts_dir: charts

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [verify-ci, version-bump, merge, release-helm]
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate SBOM for released image
        uses: anchore/sbom-action@v0
        with:
          image: syyangv/trek:${{ needs.version-bump.outputs.version }}
          format: cyclonedx-json
          output-file: trek-${{ needs.version-bump.outputs.version }}-sbom.cdx.json
          upload-artifact: false

      - name: Download release manifest metadata
        uses: actions/download-artifact@v4
        with:
          name: trek-${{ needs.version-bump.outputs.version }}-manifest

      - name: Publish release with generated notes and SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version-bump.outputs.version }}
        run: |
          if gh release view "v${VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber \
              "trek-${VERSION}-sbom.cdx.json#SBOM (CycloneDX)" \
              "trek-${VERSION}-manifest.json#Multi-arch image manifest"
          else
            gh release create "v${VERSION}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "TREK v${VERSION}" \
              --generate-notes \
              "trek-${VERSION}-sbom.cdx.json#SBOM (CycloneDX)" \
              "trek-${VERSION}-manifest.json#Multi-arch image manifest"
          fi

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: trek-${{ needs.version-bump.outputs.version }}-sbom
          path: trek-${{ needs.version-bump.outputs.version }}-sbom.cdx.json
          retention-days: 90
