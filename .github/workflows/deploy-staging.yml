name: Deploy Staging

on:
  workflow_run:
    workflows: ["Build & Push Docker Image (Prerelease)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Pinned prerelease image tag (for example 3.5.0-pre.1)"
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy pinned prerelease
    if: >-
      github.repository == 'syyangv/TREK' &&
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      actions: read
      contents: read
    env:
      APP_URL: ${{ vars.APP_URL }}
      DEPLOY_AGENT_URL: ${{ vars.DEPLOY_AGENT_URL }}
    steps:
      - name: Download triggering prerelease metadata
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: prerelease-metadata
          path: /tmp/prerelease
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve prerelease version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            SOURCE_REF="v$VERSION"
            IMAGE_DIGEST=""
          else
            source /tmp/prerelease/prerelease-metadata.env
            SOURCE_REF="$SOURCE_SHA"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-pre\.[0-9]+$ ]]; then
            echo "Expected a prerelease tag, got: $VERSION" >&2
            exit 1
          fi
          if [[ "$SOURCE_REF" != "v$VERSION" && ! "$SOURCE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid source ref in prerelease metadata" >&2
            exit 1
          fi
          {
            echo "version=$VERSION"
            echo "source_ref=$SOURCE_REF"
            echo "image_digest=$IMAGE_DIGEST"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}

      - name: Validate staging configuration
        env:
          TREK_DEPLOY_TOKEN: ${{ secrets.TREK_DEPLOY_TOKEN }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
          TS_TARGETS: ${{ vars.TS_TARGETS }}
        run: |
          test -n "$TREK_DEPLOY_TOKEN"
          test -n "$TS_OAUTH_CLIENT_ID"
          test -n "$TS_OAUTH_SECRET"
          test -n "$TS_TARGETS"
          test -n "$APP_URL"
          test -n "$DEPLOY_AGENT_URL"
          test -f scripts/trek_deploy_client.py

      - name: Connect runner to staging tailnet
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade # v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ vars.TS_TAGS || 'tag:trek-staging-ci' }}
          targets: ${{ vars.TS_TARGETS }}
          use-cache: 'true'

      - name: Verify tailnet deployment agent
        run: |
          tailscale status --json | jq -e '.BackendState == "Running"'
          curl --fail --silent --show-error -- "$DEPLOY_AGENT_URL/healthz"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve immutable image digest
        id: image
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PUBLISHED_DIGEST: ${{ steps.version.outputs.image_digest }}
        run: |
          DIGEST="$PUBLISHED_DIGEST"
          if [ -z "$DIGEST" ]; then
            DIGEST="$(docker buildx imagetools inspect "thvysy44/trek-fork:$VERSION" --format '{{.Manifest.Digest}}')"
          fi
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid image digest: $DIGEST" >&2
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image=thvysy44/trek-fork@$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Deploy exact image through restricted agent
        env:
          TREK_DEPLOY_TOKEN: ${{ secrets.TREK_DEPLOY_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SOURCE_REF: ${{ steps.version.outputs.source_ref }}
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          python3 scripts/trek_deploy_client.py \
            --url "$DEPLOY_AGENT_URL" \
            --environment staging \
            --action deploy \
            --version "$VERSION" \
            --source-ref "$SOURCE_REF" \
            --image "$IMAGE" \
            --request-id "run-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"

      - name: Verify staging health
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 \
            --retry-connrefused -- "$APP_URL/api/health"

      - name: Record deployment identity
        if: ${{ success() }}
        run: |
          {
            echo "### Staging deployment"
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Digest: \`${{ steps.image.outputs.digest }}\`"
            echo "- Source: \`${{ steps.version.outputs.source_ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
