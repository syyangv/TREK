name: Deploy Staging

on:
  workflow_run:
    workflows: ["Build & Push Docker Image (Prerelease)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Pinned prerelease image tag (for example 3.4.0-pre.2)"
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy pinned prerelease
    if: >-
      github.repository == 'syyangv/TREK' &&
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      actions: read
      contents: read
    env:
      APP_URL: ${{ vars.APP_URL }}
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME || 'trek' }}
    steps:
      - name: Download triggering prerelease metadata
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: prerelease-metadata
          path: /tmp/prerelease
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve prerelease version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            SOURCE_REF="v$VERSION"
            IMAGE_DIGEST=""
          else
            source /tmp/prerelease/prerelease-metadata.env
            SOURCE_REF="$SOURCE_SHA"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-pre\.[0-9]+$ ]]; then
            echo "Expected a prerelease tag, got: $VERSION" >&2
            exit 1
          fi
          if [[ "$SOURCE_REF" != "v$VERSION" && ! "$SOURCE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid source ref in prerelease metadata" >&2
            exit 1
          fi
          {
            echo "version=$VERSION"
            echo "source_ref=$SOURCE_REF"
            echo "image_digest=$IMAGE_DIGEST"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.source_ref }}

      - name: Validate staging configuration
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
          TS_TARGETS: ${{ vars.TS_TARGETS }}
        run: |
          test -n "$TS_OAUTH_CLIENT_ID"
          test -n "$TS_OAUTH_SECRET"
          test -n "$TS_TARGETS"
          test -n "$APP_URL"
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$COMPOSE_PROJECT_NAME"
          test -f docker-compose.yml
          test -f docker-compose.override.yml

      - name: Connect runner to staging tailnet
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade # v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ vars.TS_TAGS || 'tag:trek-staging-ci' }}
          targets: ${{ vars.TS_TARGETS }}
          use-cache: 'true'

      - name: Verify tailnet and deployment host
        run: |
          tailscale status --json | jq -e '.BackendState == "Running"'
          tailscale ping --timeout=10s "$DEPLOY_HOST"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve immutable image digest
        id: image
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PUBLISHED_DIGEST: ${{ steps.version.outputs.image_digest }}
        run: |
          DIGEST="$PUBLISHED_DIGEST"
          if [ -z "$DIGEST" ]; then
            DIGEST="$(docker buildx imagetools inspect "thvysy44/trek-fork:$VERSION" --format '{{.Manifest.Digest}}')"
          fi
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid image digest: $DIGEST" >&2
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image=thvysy44/trek-fork@$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Validate Compose digest override
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          resolved="$(TREK_IMAGE="$IMAGE" docker compose \
            -f docker-compose.yml -f docker-compose.override.yml \
            config --images)"
          test "$resolved" = "$IMAGE"

      - name: Install checked-out Compose definition
        run: |
          printf -v remote_path_q '%q' "$DEPLOY_PATH"
          base_compose_b64="$(base64 -w0 docker-compose.yml)"
          override_compose_b64="$(base64 -w0 docker-compose.override.yml)"
          printf -v base_b64_q '%q' "$base_compose_b64"
          printf -v override_b64_q '%q' "$override_compose_b64"
          remote="$DEPLOY_USER@$DEPLOY_HOST"
          tailscale ssh "$remote" "set -eu; test -d $remote_path_q; test -f $remote_path_q/.env; mkdir -p $remote_path_q/data $remote_path_q/uploads $remote_path_q/.trek-ci; printf %s $base_b64_q | base64 --decode > $remote_path_q/.trek-ci/docker-compose.yml.tmp; printf %s $override_b64_q | base64 --decode > $remote_path_q/.trek-ci/docker-compose.override.yml.tmp; mv $remote_path_q/.trek-ci/docker-compose.yml.tmp $remote_path_q/.trek-ci/docker-compose.yml; mv $remote_path_q/.trek-ci/docker-compose.override.yml.tmp $remote_path_q/.trek-ci/docker-compose.override.yml; docker compose version"

      - name: Capture rollback target
        id: rollback
        run: |
          remote="$DEPLOY_USER@$DEPLOY_HOST"
          previous="$(tailscale ssh "$remote" "docker inspect --format '{{index .RepoDigests 0}}' trek 2>/dev/null || true")"
          if [[ "$previous" =~ ^[^[:space:]@]+@sha256:[0-9a-f]{64}$ ]]; then
            echo "image=$previous" >> "$GITHUB_OUTPUT"
            echo "Immutable rollback target captured."
          else
            echo "No immutable rollback target is available for this deployment."
          fi

      - name: Deploy exact image with Docker Compose
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          printf -v path_q '%q' "$DEPLOY_PATH"
          printf -v project_q '%q' "$COMPOSE_PROJECT_NAME"
          printf -v image_q '%q' "$IMAGE"
          remote="$DEPLOY_USER@$DEPLOY_HOST"
          compose="docker compose --project-directory $path_q -p $project_q -f $path_q/.trek-ci/docker-compose.yml -f $path_q/.trek-ci/docker-compose.override.yml"
          tailscale ssh "$remote" "set -eu; TREK_IMAGE=$image_q $compose pull app; TREK_IMAGE=$image_q $compose up -d --no-build --wait --wait-timeout 300 app; actual=\$(docker inspect --format '{{.Config.Image}}' trek); test \"\$actual\" = $image_q"

      - name: Verify staging health
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 \
            --retry-connrefused -- "$APP_URL/api/health"

      - name: Roll back failed deployment
        if: ${{ failure() && steps.rollback.outputs.image != '' }}
        env:
          PREVIOUS_IMAGE: ${{ steps.rollback.outputs.image }}
        run: |
          printf -v path_q '%q' "$DEPLOY_PATH"
          printf -v project_q '%q' "$COMPOSE_PROJECT_NAME"
          printf -v image_q '%q' "$PREVIOUS_IMAGE"
          remote="$DEPLOY_USER@$DEPLOY_HOST"
          compose="docker compose --project-directory $path_q -p $project_q -f $path_q/.trek-ci/docker-compose.yml -f $path_q/.trek-ci/docker-compose.override.yml"
          tailscale ssh "$remote" "set -eu; TREK_IMAGE=$image_q $compose pull app; TREK_IMAGE=$image_q $compose up -d --no-build --wait --wait-timeout 300 app; actual=\$(docker inspect --format '{{.Config.Image}}' trek); test \"\$actual\" = $image_q"

      - name: Capture safe failure diagnostics
        if: ${{ failure() }}
        run: |
          printf -v path_q '%q' "$DEPLOY_PATH"
          printf -v project_q '%q' "$COMPOSE_PROJECT_NAME"
          remote="$DEPLOY_USER@$DEPLOY_HOST"
          compose="docker compose --project-directory $path_q -p $project_q -f $path_q/.trek-ci/docker-compose.yml -f $path_q/.trek-ci/docker-compose.override.yml"
          tailscale ssh "$remote" "$compose ps || true; docker inspect --format 'name={{.Name}} status={{.State.Status}} image={{.Config.Image}}' trek 2>/dev/null || true" || true

      - name: Record deployment identity
        if: ${{ success() }}
        run: |
          {
            echo "### Staging deployment"
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Digest: \`${{ steps.image.outputs.digest }}\`"
            echo "- Source: \`${{ steps.version.outputs.source_ref }}\`"
            echo "- Host: \`$DEPLOY_HOST\`"
          } >> "$GITHUB_STEP_SUMMARY"
